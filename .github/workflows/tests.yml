name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    # Manual trigger from GitHub Actions UI

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    name: ${{ matrix.os }} · Python ${{ matrix.python-version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ${{ runner.os == 'macOS' && '~/Library/Caches/pip' || '~/.cache/pip' }}
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('.github/workflows/tests.yml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov ruff

      - name: Lint with ruff
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: |
          ruff check \
            core/ operator/ REVENUE/ conversion_surface/ executive_layer/ \
            interfaces/ FLOW_DIRECTOR/ engagement_engine/ revenue_layer/ \
            platform_dispatch/ editorial_engine/ vendor/ automation/ \
            BROWSER_OPERATOR/ SRE/ dashboards/

      - name: Run test suite with coverage
        env:
          PYTHONPATH: .
        run: |
          python -m pytest tests/ \
            --cov=. \
            --cov-config=.coveragerc \
            --cov-report=term \
            --cov-report=xml \
            --cov-fail-under=60 \
            -v --tb=short

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7

name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: "0 3 * * *"   # nightly at 3 AM UTC — catch regressions from dep updates
  workflow_dispatch:
    # Manual trigger from GitHub Actions UI

permissions:
  contents: read
  id-token: write   # needed by codecov/codecov-action@v5 for tokenless upload

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    name: ${{ matrix.os }} · Python ${{ matrix.python-version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ${{ runner.os == 'macOS' && '~/Library/Caches/pip' || '~/.cache/pip' }}
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --only-binary :all: -r requirements-ci.txt

      - name: Lint with ruff
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: |
          BASELINE=391
          ruff check \
            core/ operator/ REVENUE/ conversion_surface/ executive_layer/ \
            interfaces/ FLOW_DIRECTOR/ engagement_engine/ revenue_layer/ \
            platform_dispatch/ editorial_engine/ vendor/ automation/ \
            BROWSER_OPERATOR/ SRE/ dashboards/ \
            --exit-zero | tee /tmp/ruff.log
          COUNT=$(grep -cE '^[A-Z]+[0-9]+ ' /tmp/ruff.log || true)
          echo "Ruff violations: $COUNT (baseline: $BASELINE)"
          if [ "$COUNT" -gt "$BASELINE" ]; then
            echo "::warning title=Ruff violations increased::Violations went from $BASELINE to $COUNT (+$((COUNT - BASELINE)))"
          elif [ "$COUNT" -lt "$BASELINE" ]; then
            echo "Violations decreased: $BASELINE → $COUNT (-$((BASELINE - COUNT))) — nice!"
          fi

      - name: Run test suite with coverage
        env:
          PYTHONPATH: .
        run: |
          python -m pytest tests/ \
            --cov=. \
            --cov-config=.coveragerc \
            --cov-report=term \
            --cov-report=xml \
            --cov-fail-under=40 \
            -v --tb=short

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false

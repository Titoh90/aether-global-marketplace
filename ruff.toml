# Ruff config for IMPERIO_ROOT.
# Ruff's default rule set (E, F, W) covers pycodestyle + pyflakes.
# Run: ruff check          (lint only)
#      ruff check --fix    (auto-fix safe issues)
#      ruff format         (format code)

target-version = "py311"

[lint]
ignore = [
    # Intentional style choice — compact season conditionals
    "E701",   # multiple statements on one line
]

# Note: 391 pre-existing ruff violations exist across the codebase.
# The CI lint step uses --exit-zero so violations are visible but
# non-blocking. Remove --exit-zero (and rules from ignore) as the
# codebase is cleaned up.

exclude = [
    "APPLIO",
    "FOOOCUS",
    "STABLE_AUDIO",
    "REAL_ESRGAN",
    "PIXELLE_VIDEO",
    "JCODE_RUNTIME",
    "UI_TARS",
    "DEERFLOW",
    "tests",
    ".git",
    "__pycache__",
]
